sections:
  - title: Automation That Works While You Sleep
    description: Build powerful no-code workflows that trigger on any event, connect your tools, and handle the repetitive work — so your team can focus on what actually matters.
    id: features
    orientation: horizontal
    features:
      - title: Event-Driven Triggers
        description: Any action in your stack can kick off a workflow. No polling, no delays.
        icon: i-lucide-bolt
      - title: 200+ Integrations
        description: Connect Slack, HubSpot, Stripe, GitHub, and hundreds more out of the box.
        icon: i-lucide-plug
      - title: Zero-Code Builder
        description: Visual workflow editor that anyone on your team can use — no engineers needed.
        icon: i-lucide-blocks
  - title: Observability Built For Scale
    description: Real-time dashboards, anomaly detection, and AI-powered alerts so you always know what's happening — before your users do.
    orientation: horizontal
    reverse: true
    features:
      - title: Real-Time Metrics
        description: Sub-second data latency across all your services and integrations.
        icon: i-lucide-activity
      - title: Smart Alerting
        description: AI that learns your baseline and only alerts when something's actually wrong.
        icon: i-lucide-bell
      - title: Custom Dashboards
        description: Drag-and-drop builder for the metrics your team cares about.
        icon: i-lucide-layout-dashboard

features:
  title: Everything your team needs to ship
  description: Stop stitching together tools. Everything you need is already here.
  items:
    - title: Authentication Built In
      description: Pre-built flows for login, signup, MFA, and SSO. Connect your identity provider in minutes.
      icon: i-lucide-shield
    - title: Role-Based Access
      description: Fine-grained permissions at the organization, team, and resource level.
      icon: i-lucide-users
    - title: Developer API
      description: RESTful and GraphQL APIs with full OpenAPI docs and SDK for every major language.
      icon: i-lucide-terminal
    - title: Audit Logs
      description: Tamper-proof logs of every action with full export for compliance.
      icon: i-lucide-file-text
    - title: 99.99% Uptime SLA
      description: Multi-region infrastructure with automatic failover and zero-downtime deploys.
      icon: i-lucide-check-circle
    - title: Infinite Customization
      description: White-label the entire product. Your brand, your domain, your CSS.
      icon: i-lucide-settings

