faq:
  title: Frequently Asked Questions
  description: Can't find what you're looking for? Chat with our team.
  items:
    - label: Is there a free plan?
      content: "Yes! Our Starter plan is free forever and includes everything you need to get started. No credit card required."
    - label: Can I cancel anytime?
      content: "Absolutely. Cancel from your settings at any time. You won't be charged again after cancellation."
    - label: Do you offer discounts for yearly billing?
      content: "Yes, yearly billing saves you 20% compared to monthly. Switch at any time from your billing settings."
    - label: What happens when I hit my workflow limit?
      content: "We'll notify you at 80% usage. You can upgrade your plan or purchase additional runs à la carte."

