label: Agency
description: Ideal for creative agencies and design studios
color: violet
icon: i-lucide-sparkles

hero:
  title: We Build Digital Experiences That [Define The Future]{class="text-primary"}
  description: The award-winning creative studio for bold brands who want to move faster, think bigger, and leave a lasting mark.
  links:
    - label: View Our Work
      icon: i-lucide-arrow-right
      trailing: true
      to: '#features'
      size: xl
    - label: Get In Touch
      icon: i-lucide-mail
      size: xl
      color: neutral
      variant: subtle
      to: '#cta'

logos:
  title: Trusted by world-class teams
  items:
    - name: Airbnb
      icon: i-simple-icons-airbnb
    - name: Spotify
      icon: i-simple-icons-spotify
    - name: Slack
      icon: i-simple-icons-slack
    - name: GitHub
      icon: i-simple-icons-github
    - name: Linear
      icon: i-simple-icons-linear
    - name: Vercel
      icon: i-simple-icons-vercel

sections:
  - title: Strategy That Moves Markets
    description: We combine deep market research with creative instinct to craft brand strategies that don't just look good — they perform. From positioning to messaging to visual identity.
    id: features
    orientation: horizontal
    features:
      - title: Brand Strategy
        description: Market analysis, positioning, and brand architecture that sets you apart from day one.
        icon: i-lucide-lightbulb
      - title: Creative Direction
        description: Art direction and visual language that creates immediate emotional resonance.
        icon: i-lucide-palette
      - title: Campaign Planning
        description: Multi-channel campaigns built on data, executed with creative precision.
        icon: i-lucide-target
  - title: End-to-End Digital Production
    description: From wireframes to live deployments, we own the entire digital production pipeline. Design, engineering, and QA all under one roof — with zero handoff friction.
    orientation: horizontal
    reverse: true
    features:
      - title: UX / UI Design
        description: Research-backed interfaces that feel intuitive and convert at every touchpoint.
        icon: i-lucide-monitor
      - title: Web Engineering
        description: Performant Nuxt and React applications with pixel-perfect implementation.
        icon: i-lucide-code-2
      - title: Launch & Grow
        description: Post-launch analytics, A/B testing, and iterative optimization.
        icon: i-lucide-trending-up

features:
  title: Why leading brands choose us
  description: We're not just an agency. We're an embedded creative partner obsessed with your growth.
  items:
    - title: Award-Winning Design
      description: 15+ international design awards. We set the standard, not follow it.
      icon: i-lucide-award
    - title: Transparent Process
      description: Weekly updates, clear milestones, and zero black-box surprises.
      icon: i-lucide-shield-check
    - title: Speed That Scales
      description: Sprint-based delivery with production-quality output from week one.
      icon: i-lucide-zap
    - title: Full Ownership
      description: You own all deliverables, code, and creative assets. Always.
      icon: i-lucide-lock
    - title: Cross-Industry Expertise
      description: From fintech to fashion, we've built for every sector.
      icon: i-lucide-globe
    - title: Post-Launch Support
      description: 90-day hyper care included with every engagement.
      icon: i-lucide-headphones

stats:
  title: Results that speak
  description: Measurable impact across every engagement.
  items:
