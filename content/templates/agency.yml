pricing:
  title: Simple, Transparent Pricing
  description: No retainers, no surprises. Choose the engagement model that fits your stage.
  plans:
    - title: Sprint
      description: Perfect for focused, time-boxed projects.
      price: '$9,000'
      billing: one-time
      features:
        - Brand audit and strategy document
        - Up to 5 key deliverables
        - 2-week delivery window
        - 1 round of revisions
      button:
        label: Start a Sprint
        to: '#cta'
        variant: outline
    - title: Studio
      description: Our most popular engagement for full projects.
      price: '$25,000'
      billing: per project
      highlight: true
      features:
        - Full brand or digital project
        - Dedicated team of 3
        - 8-week delivery window
        - Unlimited revisions
        - 90-day post-launch support
      button:
        label: Let's Build Together
        to: '#cta'
    - title: Partner
      description: For ongoing strategic and creative partnership.
      price: '$8,000'
      billing: per month
      features:
        - 40 hours of creative capacity
        - Weekly strategy sessions
        - Priority support
        - Full source code ownership
      button:
        label: Become a Partner
        to: '#cta'
        variant: outline

faq:
  title: Common Questions
  description: Everything you need to know before we start.
  items:
    - label: How long does a typical project take?
      content: 'Sprints are 2 weeks. Full projects are typically 6–10 weeks depending on scope. We always define timelines clearly upfront.'
    - label: Do you work with startups?
      content: 'Yes! We love working with early-stage companies. We offer startup-friendly pricing and a lean process designed for speed.'
    - label: Who owns the final deliverables?
      content: 'You do, 100%. All code, design files, and brand assets are transferred to you at project close.'
    - label: Do you offer ongoing support?
      content: 'Yes. Our Partner plan gives you a dedicated monthly capacity. Ad-hoc support is also available as needed.'

cta:
  title: Ready to build something extraordinary?
  description: Tell us about your project. We'll get back to you within 24 hours.
  links:
    - label: Start a Conversation
      to: 'mailto:hello@studio.com'
      trailingIcon: i-lucide-arrow-right
    - label: See Our Portfolio
      to: '#'
      variant: subtle
      icon: i-lucide-external-link
