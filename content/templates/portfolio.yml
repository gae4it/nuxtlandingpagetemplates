sections:
  - title: I Build Scalable Frontends
    description: Deeply experienced in Vue 3, Nuxt 4, and React. I architect component systems that are fast, accessible, and maintainable — even at scale. My code ships to production with zero excuses.
    id: projects
    orientation: horizontal
    features:
      - title: Component Architecture
        description: Design system thinking applied to every project. Reusable, composable, testable.
        icon: i-lucide-layers
      - title: Performance First
        description: Core Web Vitals, lazy loading, SSR/SSG — optimized from day one.
        icon: i-lucide-zap
      - title: TypeScript Expert
        description: Full type safety across the stack with zero any-escaping.
        icon: i-lucide-code-2
  - title: Backend & Infrastructure Too
    description: I'm not just a UI developer. I've built APIs, set up CI/CD pipelines, and designed cloud infrastructure for systems serving millions of users.
    orientation: horizontal
    reverse: true
    features:
      - title: Node.js / Go APIs
        description: RESTful and GraphQL APIs with proper auth, validation, and error handling.
        icon: i-lucide-server
      - title: Database Design
        description: PostgreSQL, Redis, and vector databases — schema design you won't regret later.
        icon: i-lucide-database
      - title: DevOps & Infra
        description: AWS, GCP, Docker, Kubernetes. I can ship and operate what I build.
        icon: i-lucide-cloud
