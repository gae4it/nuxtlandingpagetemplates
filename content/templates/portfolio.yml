faq:
  title: Working Together
  description: A few things people usually ask before we start.
  items:
    - label: What's your typical availability?
      content: I take on 2–3 retainer clients at a time and book project work 4–6 weeks out. Reach out early to secure a spot.
    - label: Do you work with early-stage startups?
      content: Yes, it's where I do some of my best work. I love building MVPs with lean teams under real constraints.
    - label: What time zones do you work in?
      content: I'm based in Central Europe (CET) but regularly work with US and APAC teams. Async-first works great for me.
    - label: Can you work on-site?
      content: For the right project, absolutely. Let me know your location and we can figure it out.
features:
  title: What I bring to your team
  description: Hard skills are table stakes. Here's what actually makes the difference.
  items:
    - title: Product Thinking
      description: I ask "why" before "how". Good engineers understand the business, not just the ticket.
      icon: i-lucide-lightbulb
    - title: Clear Communication
      description: Status updates, architecture explanations, and documentation that non-engineers can read.
      icon: i-lucide-message-square
    - title: Ownership Mindset
      description: I don't wait to be told. I find problems before they become incidents.
      icon: i-lucide-shield
    - title: Fast Learner
      description: New tech stack? Give me a weekend. I've done it more times than I can count.
      icon: i-lucide-rocket
    - title: Tested Instincts
      description: 10+ years of production experience means I've made the mistakes so you don't have to.
      icon: i-lucide-brain
    - title: Async-Native
      description: I thrive in remote-first environments. Timezone-friendly, documentation-heavy, meeting-light.
      icon: i-lucide-globe
